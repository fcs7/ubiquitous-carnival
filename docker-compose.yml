services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: muglia
      POSTGRES_PASSWORD: muglia
      POSTGRES_DB: muglia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./secrets/google_credentials.json:/run/secrets/google_credentials.json:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
