server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter web — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API para o backend
    location /clientes/ { proxy_pass http://backend:8000; }
    location /processos/ { proxy_pass http://backend:8000; }
    location /financeiro/ { proxy_pass http://backend:8000; }
    location /prazos/ { proxy_pass http://backend:8000; }
    location /conversas/ { proxy_pass http://backend:8000; }
    location /vindi/ { proxy_pass http://backend:8000; }
    location /webhooks/ { proxy_pass http://backend:8000; }
    location /tags/ { proxy_pass http://backend:8000; }
    location /health { proxy_pass http://backend:8000; }
}
