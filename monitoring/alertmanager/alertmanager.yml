# Configuracao do Alertmanager para o projeto Muglia
# Encaminha alertas via webhook para o backend, que notifica pelo WhatsApp

global:
  resolve_timeout: 5m  # Tempo para considerar um alerta como resolvido

# Roteamento de alertas
route:
  # Agrupa alertas pelo nome do alerta
  group_by: ["alertname"]

  # Tempo de espera antes de enviar a primeira notificacao de um grupo
  group_wait: 30s

  # Intervalo minimo entre notificacoes de um mesmo grupo
  group_interval: 5m

  # Intervalo para reenviar alertas que continuam ativos
  repeat_interval: 4h

  # Receptor padrao para todos os alertas
  receiver: "whatsapp-webhook"

# Configuracao dos receptores de alerta
receivers:
  # Webhook que envia para o backend FastAPI, que processa e notifica via WhatsApp (Evolution API)
  - name: "whatsapp-webhook"
    webhook_configs:
      - url: "http://backend:8000/webhooks/alertmanager"
        send_resolved: true  # Notifica tambem quando o alerta e resolvido
