# Provisionamento automatico de dashboards do Grafana para o projeto Muglia

apiVersion: 1

providers:
  # Dashboards do sistema Muglia - carregados automaticamente do diretorio
  - name: "Muglia"
    orgId: 1
    folder: "Muglia"
    type: file
    disableDeletion: false
    editable: true  # Permite ajustes manuais nos dashboards provisionados
    updateIntervalSeconds: 30  # Verifica novos dashboards a cada 30 segundos
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
