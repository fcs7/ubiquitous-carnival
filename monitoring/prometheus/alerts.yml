# Regras de alerta do Prometheus para o projeto Muglia
# Todos os alertas com nomes e descricoes em portugues brasileiro

groups:
  # Alertas de disponibilidade dos servicos
  - name: disponibilidade
    rules:
      # Alerta quando qualquer servico monitorado fica indisponivel por mais de 1 minuto
      - alert: ServicoIndisponivel
        expr: up == 0
        for: 1m
        labels:
          severity: critico
        annotations:
          summary: "Servico {{ $labels.job }} indisponivel"
          description: "O servico {{ $labels.job }} (instancia {{ $labels.instance }}) esta indisponivel ha mais de 1 minuto."

  # Alertas do backend FastAPI
  - name: backend
    rules:
      # Taxa de erros HTTP 5xx acima de 10% nos ultimos 5 minutos
      - alert: BackendErrorRateAlto
        expr: |
          (
            sum(rate(http_requests_total{job="backend", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="backend"}[5m]))
          ) > 0.10
        for: 5m
        labels:
          severity: critico
        annotations:
          summary: "Taxa de erros HTTP 5xx acima de 10%"
          description: "O backend esta retornando mais de 10% de erros HTTP 5xx nos ultimos 5 minutos. Taxa atual: {{ $value | humanizePercentage }}."

  # Alertas do Celery (workers e tarefas)
  - name: celery
    rules:
      # Mais de 5 tarefas Celery falhando em uma janela de 10 minutos
      - alert: CeleryTasksFalhando
        expr: |
          sum(increase(celery_task_failed_total[10m])) > 5
        for: 10m
        labels:
          severity: aviso
        annotations:
          summary: "Tarefas Celery falhando com frequencia"
          description: "Mais de 5 tarefas Celery falharam nos ultimos 10 minutos. Total de falhas: {{ $value }}."

  # Alertas do PostgreSQL
  - name: postgres
    rules:
      # Conexoes do PostgreSQL acima de 80% do maximo configurado
      - alert: PostgresConexoesAltas
        expr: |
          sum(pg_stat_activity_count) / on() pg_settings_max_connections > 0.80
        for: 5m
        labels:
          severity: aviso
        annotations:
          summary: "Conexoes do PostgreSQL acima de 80% do limite"
          description: "O PostgreSQL esta utilizando mais de 80% das conexoes disponiveis. Uso atual: {{ $value | humanizePercentage }}."

  # Alertas do Redis
  - name: redis
    rules:
      # Uso de memoria do Redis acima de 80% do maximo configurado
      - alert: RedisMemoriaAlta
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.80
        for: 5m
        labels:
          severity: aviso
        annotations:
          summary: "Memoria do Redis acima de 80%"
          description: "O Redis esta utilizando mais de 80% da memoria maxima configurada. Uso atual: {{ $value | humanizePercentage }}."

  # Alertas de containers Docker
  - name: containers
    rules:
      # Container reiniciando mais de 3 vezes em 10 minutos (possivel crash loop)
      - alert: ContainerRestartLoop
        expr: |
          increase(container_restart_count[10m]) > 3
        for: 10m
        labels:
          severity: critico
        annotations:
          summary: "Container {{ $labels.name }} em loop de reinicializacao"
          description: "O container {{ $labels.name }} reiniciou mais de 3 vezes nos ultimos 10 minutos. Verifique os logs para identificar a causa."
